<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YRC's Pick 관리</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    * { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; }
    body { background: #f8fafc; color: #1e293b; min-height: 100vh; }
    a { text-decoration: none; }
    button { cursor: pointer; font-family: inherit; }

    .wrap { max-width: 48rem; margin: 0 auto; padding: 2.5rem 1.5rem; }
    .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    h1 { font-size: 20px; font-weight: 800; }
    .logout-btn { background: #f1f5f9; color: #334155; border: none; border-radius: 10px; padding: 8px 14px; font-size: 12px; font-weight: 600; }
    .logout-btn:hover { background: #e2e8f0; }

    .login-box { max-width: 22rem; margin: 6rem auto 0; background: #fff; border-radius: 20px; padding: 28px; box-shadow: 0 1px 2px rgba(15,23,42,0.04), 0 16px 32px -20px rgba(15,23,42,0.15); }
    .login-box h1 { margin-bottom: 16px; }
    .login-box input { width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 11px 14px; font-size: 14px; outline: none; margin-bottom: 12px; }
    .login-box input:focus { border-color: #f97316; }
    .login-box button { width: 100%; background: #f97316; color: #fff; border: none; border-radius: 10px; padding: 11px; font-size: 14px; font-weight: 700; }
    .login-box button:hover { background: #ea580c; }

    .search-box input {
      width: 100%; background: #fff; border: 1px solid #e2e8f0;
      border-radius: 12px; padding: 10px 16px; font-size: 13px; outline: none; margin-bottom: 1.25rem;
    }
    .search-box input:focus { border-color: #f97316; }

    .race-list { display: flex; flex-direction: column; gap: 8px; }
    .race-item {
      display: flex; align-items: center; gap: 12px;
      background: #fff; border-radius: 14px; padding: 12px 16px;
      box-shadow: 0 1px 2px rgba(15,23,42,0.04);
    }
    .pick-btn {
      flex-shrink: 0; width: 34px; height: 34px; border-radius: 10px;
      border: 1px solid #e2e8f0; background: #fff; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      color: #cbd5e1; transition: all 0.15s;
    }
    .pick-btn.active { background: #f97316; border-color: #f97316; color: #fff; }
    .race-item-body { flex: 1; min-width: 0; }
    .race-item-title { font-size: 13px; font-weight: 600; color: #1e293b; }
    .race-item-meta { font-size: 11px; color: #94a3b8; margin-top: 2px; }
  </style>
</head>
<body>

{% if not authed %}
<div class="login-box">
  <h1>YRC's Pick 관리</h1>
  <form method="POST" action="/admin">
    <input type="password" name="password" placeholder="비밀번호" autofocus />
    <button type="submit">로그인</button>
  </form>
</div>
{% else %}
<div class="wrap">
  <div class="top">
    <h1>YRC's Pick 관리 <span style="color:#94a3b8; font-weight:500;">· ⭐ 버튼을 눌러 픽 대회를 고르세요</span></h1>
    <form method="POST" action="/admin/logout"><button class="logout-btn" type="submit">로그아웃</button></form>
  </div>
  <div class="search-box">
    <form method="GET" action="/admin">
      <input type="text" name="search" value="{{ search }}" placeholder="대회명 또는 지역으로 검색..." onchange="this.form.submit()" />
    </form>
  </div>
  <div class="race-list">
    {% for race in races %}
    <div class="race-item">
      <button class="pick-btn {{ 'active' if race.is_pick else '' }}" data-id="{{ race.id }}" onclick="togglePick(this)">★</button>
      <div class="race-item-body">
        <div class="race-item-title">{{ race.title }}</div>
        <div class="race-item-meta">{{ race.date }} · {{ race.location or '-' }}</div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
<script>
  async function togglePick(btn) {
    const id = btn.dataset.id;
    btn.disabled = true;
    try {
      const res = await fetch('/api/pick/' + id, { method: 'POST' });
      const data = await res.json();
      btn.classList.toggle('active', data.is_pick);
    } finally {
      btn.disabled = false;
    }
  }
</script>
{% endif %}
</body>
</html>
